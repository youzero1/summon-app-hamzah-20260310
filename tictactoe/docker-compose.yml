version: '3.8'

services:
  tictactoe:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_PATH=./data/tictactoe.db
      - NODE_ENV=production
    volumes:
      - tictactoe-data:/app/data
    restart: unless-stopped

volumes:
  tictactoe-data:
